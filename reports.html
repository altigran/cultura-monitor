<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Culture Monitor — Editor de Relatório</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="reports.css" />
</head>
<body>
  <header class="appbar">
    <div class="appbar-left">
      <span class="brand-badge">☺</span>
      <span class="brand-name">Culture Monitor <small>v.0</small></span>
      <nav class="crumbs" id="crumbs"></nav>
    </div>
    <div class="appbar-right">
      <span class="live">live<b>.</b></span>
    </div>
  </header>

  <div class="layout">
    <aside class="sidebar">
      <a class="nav" href="index.html"><span class="i">≣</span> Curadoria</a>
      <button class="nav is-active"><span class="i">▤</span> Reports</button>
    </aside>

    <main class="content">
      <div class="content-head">
        <div>
          <h1>Editor de Relatório</h1>
          <p class="muted">Monte o report do dia a partir do Workspace curado</p>
        </div>
        <div class="rb-actions">
          <button class="btn ghost" id="btn-new">+ Novo report</button>
          <button class="btn-yellow" id="btn-preview">▶ Pré-visualizar</button>
        </div>
      </div>

      <section id="builder"></section>
      <section id="preview" hidden></section>
    </main>
  </div>

  <script src="data/posts.js"></script>
  <script src="report.js"></script>
</body>
</html>
